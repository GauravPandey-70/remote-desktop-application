# ============================================
# DeskLink — coturn Configuration (Development)
# Minimal TURN server config for local development.
# ============================================

# Network
listening-port=3478
tls-listening-port=5349

# Authentication
lt-cred-mech
user=desklink:desklink_turn_dev
realm=desklink.local

# Logging
log-file=stdout
verbose

# Security
no-multicast-peers
no-cli

# Allocation
min-port=49152
max-port=65535

# Fingerprint
fingerprint
